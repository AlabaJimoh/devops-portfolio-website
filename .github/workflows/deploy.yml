name: Deploy Portfolio

# Trigger: runs on every push to main branch
on:
  push:
    branches:
      - main

# Permissions needed for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  # ─── JOB 1: Validate project files ───────────────────────────
  validate:
    name: Validate Project Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show All Files
        run: ls -la

      - name: Verify index.html Exists
        run: |
          test -f index.html && echo "✅ index.html found" || (echo "❌ index.html missing" && exit 1)

      - name: Verify style.css Exists
        run: |
          test -f style.css && echo "✅ style.css found" || (echo "❌ style.css missing" && exit 1)

      - name: Verify README.md Exists
        run: |
          test -f README.md && echo "✅ README.md found" || (echo "❌ README.md missing" && exit 1)

      - name: Check HTML is not empty
        run: |
          if [ -s index.html ]; then
            echo "✅ index.html has content"
          else
            echo "❌ index.html is empty"
            exit 1
          fi

      - name: Print File Sizes
        run: |
          echo "File sizes:"
          wc -l index.html style.css README.md

  # ─── JOB 2: Deploy to GitHub Pages ───────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate          # Only runs if validate job passes

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Site Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .            # Upload everything in root directory

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print Deployed URL
        run: echo "🚀 Site deployed to ${{ steps.deployment.outputs.page_url }}"
