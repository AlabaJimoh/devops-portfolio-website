name: Portfolio CI

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Files
        run: ls -la

      - name: Verify Homepage Exists
        run: test -f index.html

      - name: Verify CSS Exists
        run: test -f style.css